<div class="appear-anim">
    <h1>analytics</h1>
    <h2>visits</h2>
    <div id="visits">
        <p type="visit" when="today"><b>today:</b></p>
        <p type="visit" when="yesterday"><b>yesterday:</b></p>
        <p type="visit" when="forever"><b>since uptime:</b></p>
    </div>
    
    <h2>visits by visitor</h2>
    <p id="visitor-id"></p>
    <ol id="visitor-list"></ol>
</div>
